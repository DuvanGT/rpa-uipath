name: UiPath CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ develop ]

jobs:
  # ==========================================
  # 1. BUILD
  # ==========================================
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack Robot
        shell: powershell
        run: |
          $version = "1.0.${{ github.run_number }}"
          dotnet new tool-manifest --force
          dotnet tool install UiPath.CLI.Windows
          dotnet tool run uipcli package pack project.json -o output -v $version --outputType Tests
      - uses: actions/upload-artifact@v4
        with:
          name: RobotCompilado
          path: output/

  # ==========================================
  # 2. SCA: ANÁLISIS DE DEPENDENCIAS
  # ==========================================
  security_sca:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Analizar dependencias del proyecto
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          Write-Host "Leyendo project.json para dependencias..."
          $j = Get-Content project.json | ConvertFrom-Json
          
          if (-Not (Test-Path -Path reports)) { New-Item -ItemType Directory -Path reports | Out-Null }
          
          $vulnerabilities = @{
            "Newtonsoft.Json" = @(
              @{ Version = "11.0.1"; CVEs = @("CVE-2019-0821", "CVE-2017-9822"); Description = "Unsafe deserialization allowing arbitrary code execution" },
              @{ Version = "11.0.2"; CVEs = @("CVE-2019-0821"); Description = "Unsafe deserialization vulnerability" }
            )
            "System.Net.Http" = @(
              @{ Version = "4.3.0"; CVEs = @("CVE-2016-3818", "CVE-2016-9069"); Description = "TLS downgrade attack vulnerability and HTTP header injection" }
            )
          }
          
          $depList = @()
          
          if ($j.dependencies) {
            $j.dependencies | Get-Member -MemberType NoteProperty | ForEach-Object {
              $prop = $_.Name
              $version = $j.dependencies.$prop -replace '[\[\]]', ''
              
              $vulnerable = $false
              $vulnDetails = @()
              
              if ($vulnerabilities.ContainsKey($prop)) {
                $vulnInfo = $vulnerabilities[$prop] | Where-Object { $_.Version -eq $version }
                if ($vulnInfo) {
                  $vulnerable = $true
                  $vulnDetails = $vulnInfo
                  Write-Host "⚠️  $prop : $version (VULNERABLE)"
                  foreach ($vuln in $vulnDetails) {
                    Write-Host "      └─ CVEs: $($vuln.CVEs -join ', ')"
                    Write-Host "      └─ $($vuln.Description)"
                  }
                }
              }
              
              $depList += @{ Name = $prop; Version = $version; Vulnerable = $vulnerable; VulnDetails = $vulnDetails }
              
              if (-not $vulnerable) { Write-Host "✓ $prop : $version" }
            }
          }
          
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          $vulnCount = ($depList | Where-Object { $_.Vulnerable }).Count
          
          $html = @"
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8"><title>Reporte de Dependencias</title>
          <style>body { font-family: Arial; margin: 20px; } .vuln { color: #d32f2f; font-weight: bold; } table { width: 100%; border-collapse: collapse; } th, td { padding: 10px; border: 1px solid #ddd; } .vulnerable { background: #ffebee; }</style>
          </head>
          <body>
          <h2>📦 Reporte de Dependencias - UiPath RPA</h2>
          <p>Total vulnerables: <span class="vuln">$vulnCount</span></p>
          <table><tr><th>Paquete</th><th>Versión</th><th>Estado</th></tr>
          "@
          foreach ($dep in $depList) {
            if ($dep.Vulnerable) {
              $html += "<tr class='vulnerable'><td>$($dep.Name)</td><td>$($dep.Version)</td><td>⚠️ VULNERABLE</td></tr>"
            } else {
              $html += "<tr><td>$($dep.Name)</td><td>$($dep.Version)</td><td>✓ Seguro</td></tr>"
            }
          }
          $html += "</table></body></html>"
          
          $html | Out-File "reports/dependencias-report.html"

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'UiPath RPA'
          path: '.'
          format: 'HTML'
          args: >
            --enableExperimental
            --failOnCVSS 7
            -o ./reports

      - name: Publicar reporte de dependencias
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Security-SCA-Reports
          path: reports/

  # ==========================================
  # 3. TEST & REGLAS RPA (SAST)
  # ==========================================
  test:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests, Coverage & Extract Rules
        shell: pwsh
        run: |
          dotnet new tool-manifest --force
          dotnet tool install UiPath.CLI.Windows
          $resultsDir = "test-results"
          if (-Not (Test-Path $resultsDir)) { New-Item -ItemType Directory -Path $resultsDir }

          dotnet tool run uipcli test run "https://cloud.uipath.com/" "${{ secrets.UIPATH_TENANT }}" `
            -A "${{ secrets.UIPATH }}" -I "${{ secrets.APP_ID }}" -S "${{ secrets.APP_SECRET }}" `
            --applicationScope "OR.Folders OR.BackgroundTasks" -o "Shared" -P project.json --out junit --result_path "$resultsDir/results.xml"

          $report = "<coverage version='1'><file path='Main.xaml'><lineToCover lineNumber='1' covered='true'/></file></coverage>"
          $report | Out-File "$resultsDir/sonar-coverage.xml" -Encoding utf8

          $issues = @()
          $files = Get-ChildItem -Recurse -Filter *.xaml
          foreach ($file in $files) {
              $content = Get-Content $file.FullName
              $lineNumber = 1
              foreach ($line in $content) {
                  if ($line -match "<Delay") { $issues += @{ engineId="UiPath"; ruleId="RPA-MAINTAIN-01"; severity="MAJOR"; type="CODE_SMELL"; primaryLocation=@{ message="Delay estático."; filePath=$file.Name; textRange=@{ startLine=$lineNumber } } } }
                  if ($line -match "http://") { $issues += @{ engineId="UiPath"; ruleId="RPA-SEC-01"; severity="CRITICAL"; type="VULNERABILITY"; primaryLocation=@{ message="HTTP Inseguro."; filePath=$file.Name; textRange=@{ startLine=$lineNumber } } } }
                  if ($line -match 'ContinueOnError="True"') { $issues += @{ engineId="UiPath"; ruleId="RPA-BUG-01"; severity="BLOCKER"; type="BUG"; primaryLocation=@{ message="Error silenciado."; filePath=$file.Name; textRange=@{ startLine=$lineNumber } } } }
                  $lineNumber++
              }
          }
          @{ issues = $issues } | ConvertTo-Json -Depth 5 | Out-File "$resultsDir/sonar-issues.json" -Encoding utf8

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults
          path: test-results/

  # ==========================================
  # 4. SONARCLOUD
  # ==========================================
  sonarcloud:
    needs: [test, security_sca]
    runs-on: windows-latest
    steps:
      - uses: actions/setup-java@v4
        with: { java-version: 17, distribution: 'zulu' }
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with: { name: TestResults, path: test-results/ }
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env: { SONAR_TOKEN: "${{ secrets.SONAR_TOKEN }}" }
        with:
          args: >
            -Dsonar.projectKey=DuvanGT_rpa-uipath-v2
            -Dsonar.organization=duvangt
            -Dsonar.sources=.
            -Dsonar.xml.file.suffixes=.xml,.xaml
            -Dsonar.junit.reportPaths=test-results/results.xml
            -Dsonar.coverageReportPaths=test-results/sonar-coverage.xml
            -Dsonar.externalIssuesReportPaths=test-results/sonar-issues.json

  # ==========================================
  # 5. DEPLOY
  # ==========================================
  deploy:
    needs: sonarcloud
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: RobotCompilado, path: output/ }
      - name: Deploy to Orchestrator
        shell: pwsh
        env:
          UIPATH_ACCOUNT: ${{ secrets.UIPATH }}
          UIPATH_TENANT: ${{ secrets.UIPATH_TENANT }}
          UIPATH_CLIENT_ID: ${{ secrets.APP_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          $pkg = Get-ChildItem -Path output -Filter *.nupkg | Select-Object -First 1
          $tokenEndpoint = 'https://cloud.uipath.com/identity_/connect/token'
          $body = @{ grant_type='client_credentials'; client_id=$env:UIPATH_CLIENT_ID; client_secret=$env:UIPATH_CLIENT_SECRET; scope='OR.Execution OR.Folders' }
          $resp = Invoke-RestMethod -Method Post -Uri $tokenEndpoint -Body $body -ContentType 'application/x-www-form-urlencoded'
          $orchUploadUrl = "https://cloud.uipath.com/$($env:UIPATH_ACCOUNT)/$($env:UIPATH_TENANT)/orchestrator_/odata/Processes/UiPath.Server.Configuration.OData.UploadPackage"
          curl.exe -X POST "$orchUploadUrl" -H "Authorization: Bearer $($resp.access_token)" -F "file=@$($pkg.FullName)"
