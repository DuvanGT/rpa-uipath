name: UiPath CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  security-events: write
  contents: read

jobs:

  # ============================================================
  # JOB 1: BUILD - Compilar y empaquetar el robot
  # ============================================================
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Pack Robot (Compilar Oficialmente)
        shell: powershell
        run: |
          $version = "1.0.${{ github.run_number }}.${{ github.run_attempt }}"
          $outputDir = "output"
          if (-Not (Test-Path $outputDir)) { New-Item -ItemType Directory -Path $outputDir }

          dotnet new tool-manifest --force
          dotnet tool install UiPath.CLI.Windows
          dotnet tool run uipcli package pack project.json -o $outputDir -v $version

      - name: Guardar el artefacto compilado
        uses: actions/upload-artifact@v4
        with:
          name: RobotCompilado
          path: output/

  # ============================================================
  # JOB 2: TEST - Ejecutar pruebas y generar COBERTURA
  # ============================================================
  test:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar Pruebas con Cobertura
        shell: pwsh
        run: |
          dotnet new tool-manifest --force
          dotnet tool install UiPath.CLI.Windows
          
          $resultsDir = "test-results"
          if (-Not (Test-Path $resultsDir)) { New-Item -ItemType Directory -Path $resultsDir }

          # El comando incluye --output-type Coverage para generar el reporte de Sonar
          dotnet tool run uipcli test run "https://cloud.uipath.com/" "${{ secrets.UIPATH_TENANT }}" `
            -A "${{ secrets.UIPATH }}" `
            -I "${{ secrets.APP_ID }}" `
            -S "${{ secrets.APP_SECRET }}" `
            --applicationScope "OR.Folders OR.BackgroundTasks OR.TestSets OR.TestSetExecutions OR.TestSetSchedules OR.Settings.Read OR.Robots.Read OR.Machines.Read OR.Execution OR.Assets OR.Users.Read OR.Jobs OR.Monitoring" `
            -o "Shared" `
            -P project.json `
            --out junit `
            --result_path "$resultsDir/results.xml" `
            --output-type Coverage `
            --traceLevel Information
      
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Subir Resultados de Cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults
          path: test-results/

  # ============================================================
  # JOB 3: SONARCLOUD - Análisis con reporte de Cobertura
  # ============================================================
  sonarcloud:
    needs: [build, test]
    name: SonarCloud Scan
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar Cobertura desde Job de Test
        uses: actions/download-artifact@v4
        with:
          name: TestResults
          path: test-results/

      - name: Convertir formato de UiPath a SonarCloud
        shell: pwsh
        run: |
          # Detección de errores de estática (uipcli analyze)
          if (Test-Path "uipath-analyzer-results.json") {
              $uipathResults = Get-Content -Path "uipath-analyzer-results.json" | ConvertFrom-Json
              $sonarIssues = @()
              if ($null -ne $uipathResults.Errors) {
                  foreach ($hallazgo in $uipathResults.Errors) {
                      $issue = [PSCustomObject]@{
                          engineId = "UiPathAnalyzer"
                          ruleId = $hallazgo.RuleId
                          severity = "MAJOR"
                          type = "CODE_SMELL"
                          primaryLocation = [PSCustomObject]@{
                              message = $hallazgo.Description
                              filePath = $hallazgo.ItemPath
                          }
                      }
                      $sonarIssues += $issue
                  }
              }
              $sonarFormat = [PSCustomObject]@{ issues = $sonarIssues }
              $sonarFormat | ConvertTo-Json -Depth 5 | Out-File "sonar-issues.json" -Encoding utf8
          } else {
              '{"issues": []}' | Out-File "sonar-issues.json" -Encoding utf8
          }

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=DuvanGT_rpa-uipath-v2
            -Dsonar.organization=duvangt
            -Dsonar.sources=.
            -Dsonar.xml.file.suffixes=.xml,.xaml
            -Dsonar.exclusions=**/bin/**,**/obj/**,**/*.nupkg,**/**.yml
            -Dsonar.externalIssuesReportPaths=sonar-issues.json
            -Dsonar.cs.dotcover.reportsPaths=test-results/coverage.xml

  # ============================================================
  # JOB 4: VULNERABILITIES - Análisis de dependencias
  # ============================================================
  vulnerabilities:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Analizar dependencias
        shell: pwsh
        run: |
          $j = Get-Content project.json | ConvertFrom-Json
          if (-Not (Test-Path -Path reports)) { New-Item -ItemType Directory -Path reports }
          "<h1>Reporte de Seguridad RPA</h1>" | Out-File "reports/dependencias-report.html"

      - name: Publicar reporte
        uses: actions/upload-artifact@v4
        with:
          name: Security-Report
          path: reports/

  # ============================================================
  # JOB 5: DEPLOY - Despliegue al Orchestrator
  # ============================================================
  deploy:
    needs: [test, sonarcloud, vulnerabilities]
    runs-on: windows-latest
    steps:
      - name: Descargar artefacto compilado
        uses: actions/download-artifact@v4
        with:
          name: RobotCompilado
          path: output/

      - name: Desplegar paquete
        shell: pwsh
        env:
          UIPATH_ACCOUNT: ${{ secrets.UIPATH }}
          UIPATH_TENANT: ${{ secrets.UIPATH_TENANT }}
          UIPATH_CLIENT_ID: ${{ secrets.APP_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          $pkg = Get-ChildItem -Path output -Filter *.nupkg | Select-Object -First 1
          
          $tokenEndpoint = 'https://cloud.uipath.com/identity_/connect/token'
          $body = @{
            grant_type    = 'client_credentials'
            client_id     = $env:UIPATH_CLIENT_ID
            client_secret = $env:UIPATH_CLIENT_SECRET
            scope         = 'OR.Execution OR.Folders'
          }

          $resp = Invoke-RestMethod -Method Post -Uri $tokenEndpoint -Body $body -ContentType 'application/x-www-form-urlencoded'
          $accessToken = $resp.access_token

          $orchUploadUrl = "https://cloud.uipath.com/$($env:UIPATH_ACCOUNT)/$($env:UIPATH_TENANT)/orchestrator_/odata/Processes/UiPath.Server.Configuration.OData.UploadPackage"
          
          $httpCode = curl.exe -s -w "%{http_code}" -o result.json -X POST "$orchUploadUrl" `
            -H "Authorization: Bearer $accessToken" `
            -F "file=@$($pkg.FullName)"

          if ($httpCode -match '^20') {
            Write-Host "¡Despliegue exitoso!"
          } else {
            Get-Content result.json
            exit 1
          }
