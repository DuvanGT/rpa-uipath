name: UiPath CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  security-events: write
  contents: read

jobs:
  build:
    runs-on: windows-latest # Importante: UiPath requiere Windows para compilar
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
      
      - name: Pack Robot (Compilar Oficialmente)
        shell: powershell
        run: |
          $version = "1.0.${{ github.run_number }}.${{ github.run_attempt }}"
          $outputDir = "output"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          
          Write-Host "1. Preparando el manifiesto de herramientas .NET..."
          # Crea un entorno local para instalar herramientas de forma segura
          dotnet new tool-manifest
          
          Write-Host "2. Instalando UiPath CLI oficial..."
          # Descarga la herramienta en su nuevo formato DotnetTool
          dotnet tool install UiPath.CLI.Windows
          
          Write-Host "3. Empaquetando el proyecto con la estructura correcta..."
          # Usamos 'dotnet tool run' para ejecutar uipcli sin problemas de rutas
          dotnet tool run uipcli package pack project.json -o $outputDir -v $version
          
          Write-Host "¡Empaquetado listo! Verificando archivo:"
          Get-ChildItem -Path $outputDir

      - name: Guardar el artefacto compilado
        uses: actions/upload-artifact@v4
        with:
          name: RobotCompilado
          path: output/

  sonarcloud:
    name: SonarCloud Scan
    runs-on: windows-latest
    steps:
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                java-version: 17
                distribution: 'zulu'
            
            - name: Checkout del código
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            # --- PASOS NUEVOS PARA UIPATH ---
            - name: Convertir formato de UiPath a SonarCloud
              shell: pwsh
              run: |
                if (Test-Path "uipath-analyzer-results.json") {
                    $uipathResults = Get-Content -Path "uipath-analyzer-results.json" | ConvertFrom-Json
                    $sonarIssues = @()
                    
                    if ($null -ne $uipathResults.Errors) {
                        # CORRECCIÓN: Cambiamos $error por $hallazgo para que PowerShell no se queje
                        foreach ($hallazgo in $uipathResults.Errors) {
                            $issue = [PSCustomObject]@{
                                engineId = "UiPathAnalyzer"
                                ruleId = $hallazgo.RuleId
                                severity = "MAJOR"
                                type = "CODE_SMELL"
                                primaryLocation = [PSCustomObject]@{
                                    message = $hallazgo.Description
                                    filePath = $hallazgo.ItemPath
                                }
                            }
                            $sonarIssues += $issue
                        }
                    }
                    
                    $sonarFormat = [PSCustomObject]@{ issues = $sonarIssues }
                    $sonarFormat | ConvertTo-Json -Depth 5 | Out-File "sonar-issues.json"
                    Write-Host "Archivo sonar-issues.json generado exitosamente."
                } else {
                    Write-Host "No se encontró el archivo de UiPath."
                    '{"issues": []}' | Out-File "sonar-issues.json"
                }
      
            - name: Convertir formato de UiPath a SonarCloud
              shell: pwsh
              run: |
                if (Test-Path "uipath-analyzer-results.json") {
                    $uipathResults = Get-Content -Path "uipath-analyzer-results.json" | ConvertFrom-Json
                    $sonarIssues = @()
                    
                    if ($null -ne $uipathResults.Errors) {
                        foreach ($error in $uipathResults.Errors) {
                            $issue = [PSCustomObject]@{
                                engineId = "UiPathAnalyzer"
                                ruleId = $error.RuleId
                                severity = "MAJOR"
                                type = "CODE_SMELL"
                                primaryLocation = [PSCustomObject]@{
                                    message = $error.Description
                                    filePath = $error.ItemPath
                                }
                            }
                            $sonarIssues += $issue
                        }
                    }
                    
                    $sonarFormat = [PSCustomObject]@{ issues = $sonarIssues }
                    $sonarFormat | ConvertTo-Json -Depth 5 | Out-File "sonar-issues.json"
                    Write-Host "Archivo sonar-issues.json generado exitosamente."
                } else {
                    Write-Host "No se encontró el archivo de UiPath."
                    '{"issues": []}' | Out-File "sonar-issues.json"
                }
            - name: Inyectar error de prueba para SonarCloud
              shell: pwsh
              run: |
                echo "Hola mundo"
                $fakeIssue = @"
                {
                  "issues": [
                    {
                      "engineId": "UiPathAnalyzer",
                      "ruleId": "TEST-001",
                      "severity": "MAJOR",
                      "type": "CODE_SMELL",
                      "primaryLocation": {
                        "message": "¡ÉXITO! La conexión funciona. Este es un error de prueba de UiPath.",
                        "filePath": "Main.xaml"
                      }
                    }
                  ]
                }
                "@
                $fakeIssue | Out-File "sonar-issues.json" -Encoding utf8
                Write-Host "Error falso inyectado en sonar-issues.json"

            - name: SonarCloud Scan (CLI)
              uses: SonarSource/sonarqube-scan-action@v4
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              with:
                args: >
                  -Dsonar.projectKey=DuvanGT_rpa-uipath-v2
                  -Dsonar.organization=duvangt
                  -Dsonar.sources=.
                  -Dsonar.xml.file.suffixes=.xml,.xaml
                  -Dsonar.exclusions=**/bin/**,**/obj/**,**/*.nupkg
                  -Dsonar.externalIssuesReportPaths=sonar-issues.json
